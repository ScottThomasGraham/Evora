<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Mono — Discipline</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#0c0c0d;display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Mono",monospace;}
  .bezel{padding:16px;background:#161617;border:1px solid #2a2a2c;border-radius:18px;}
  .s{position:relative;width:960px;height:544px;border-radius:8px;overflow:hidden;background:#0a0a0a;color:#e9e9e6;}
  .lime{color:#c6f24e;}.mut{color:#5f6157;}.red{color:#ff5e5e;}
  .top{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid #232323;font-weight:600;font-size:18px;letter-spacing:1px;}
  .sp{flex:1;}.top .m{color:#9a9a93;font-weight:500;}
  .lead{position:absolute;top:74px;left:24px;color:#7f8175;font-size:18px;}
  .chips{position:absolute;top:108px;left:22px;right:22px;bottom:78px;display:grid;grid-template-columns:1fr 1fr;gap:13px;align-content:start;}
  .c{border:1px solid #2a2a2a;background:#121212;padding:13px 16px;display:flex;flex-direction:column;gap:4px;}
  .c.danger{border-color:#5a2626;}
  .c .k{color:#5f6157;font-size:15px;text-transform:lowercase;}
  .c .v{font-family:"IBM Plex Mono";font-weight:700;font-size:30px;color:#e9e9e6;line-height:1;}
  .c .v .u{font-size:17px;color:#5f6157;margin-left:4px;}
  .c.danger .v{color:#ff7a7a;}
  .c.on{border-color:#c6f24e;}.c.on .v{color:#c6f24e;}
  .pro{position:absolute;bottom:0;left:0;right:0;height:58px;background:rgba(198,242,78,.08);border-top:1.5px solid #c6f24e;display:flex;align-items:center;justify-content:center;gap:12px;}
  .pro .b{font-family:"IBM Plex Mono";font-weight:700;font-size:23px;letter-spacing:2px;color:#c6f24e;}
  .pro .x{color:#7f9a3a;font-size:17px;}
</style></head>
<body><div class="bezel"><div class="s">
  <div class="top"><span class="lime">EVORA</span><span class="mut">/ EDIT</span><span class="mut">/ main_rotor</span><span class="sp"></span><span class="m">92% 14:32</span></div>
  <div class="lead">// the essentials for the head — tap a value to change it</div>
  <div class="chips">
    <div class="c danger"><span class="k">swash_type</span><span class="v red">H3-120</span></div>
    <div class="c danger"><span class="k">rotor_dir</span><span class="v red">CW</span></div>
    <div class="c on"><span class="k">collective_pitch</span><span class="v">12.0<span class="u">deg</span></span></div>
    <div class="c"><span class="k">cyclic_pitch</span><span class="v">8.0<span class="u">deg</span></span></div>
    <div class="c"><span class="k">swash_phase</span><span class="v">0<span class="u">deg</span></span></div>
    <div class="c"><span class="k">swash_ring</span><span class="v">100<span class="u">%</span></span></div>
  </div>
  <div class="pro"><span class="b">[ PRO ]</span><span class="x">all main_rotor settings →</span></div>
</div></div></body></html>
