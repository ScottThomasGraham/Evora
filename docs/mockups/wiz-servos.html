<!doctype html><html lang="en"><head><meta charset="utf-8"><title>servos</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wiz.css">
<style>
  .seg{display:flex;gap:8px;}
  .seg .o{padding:8px 18px;border-radius:11px;border:1px solid var(--line);font-family:"Rajdhani";font-weight:700;font-size:26px;color:var(--muted);background:rgba(255,255,255,.02);}
  .seg .o.on{border-color:var(--amber);color:var(--amber2);background:linear-gradient(165deg,rgba(255,146,66,.18),rgba(255,146,66,.04));}
  .row{display:flex;align-items:center;gap:14px;padding:10px 16px;border-radius:14px;border:1px solid var(--line);background:linear-gradient(165deg,rgba(255,255,255,.04),rgba(255,255,255,.01));}
  .row .lab{flex:1;}.row .lab b{font-family:"Rajdhani";font-weight:700;font-size:26px;display:block;line-height:1;}.row .lab span{color:var(--muted);font-size:16px;}
</style></head><body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Servos</span><span class="step">STEP 3 / 13</span><div class="pbar" style="width:23%"></div></div>
  <div class="title">Servo pulse</div>
  <div class="sub">Match the centre-pulse width to your servos — wrong, and they can be damaged.</div>
  <div class="stage">
    <div class="diagram" style="flex:0 0 340px;height:218px">
      <svg width="320" height="210" viewBox="0 0 320 210">
        <!-- servo body + horn -->
        <rect x="24" y="70" width="78" height="60" rx="8" fill="#18222e" stroke="#2a3644" stroke-width="2"/>
        <circle cx="63" cy="62" r="12" fill="#11161d" stroke="var(--amber)" stroke-width="2.5"/>
        <line x1="63" y1="62" x2="63" y2="34" stroke="var(--amber)" stroke-width="4" stroke-linecap="round"/>
        <text x="63" y="106" fill="var(--dim)" font-family="Barlow Semi Condensed" font-size="14" text-anchor="middle">servo</text>
        <!-- pulse timing -->
        <line x1="130" y1="150" x2="306" y2="150" stroke="#2a3644" stroke-width="2"/>
        <path d="M150 150 v-44 h70 v44 h70" fill="none" stroke="var(--green)" stroke-width="3"/>
        <!-- width dimension -->
        <line x1="150" y1="92" x2="220" y2="92" stroke="var(--amber)" stroke-width="2"/>
        <path d="M150 92 l8 -5 m-8 5 l8 5" stroke="var(--amber)" stroke-width="2" fill="none"/>
        <path d="M220 92 l-8 -5 m8 5 l-8 5" stroke="var(--amber)" stroke-width="2" fill="none"/>
        <text x="185" y="84" fill="var(--amber2)" font-family="Rajdhani" font-weight="700" font-size="18" text-anchor="middle">1520 µs</text>
        <text x="185" y="172" fill="var(--muted)" font-family="Barlow Semi Condensed" font-size="14" text-anchor="middle">neutral / centre</text>
      </svg>
    </div>
    <div class="chips" style="gap:14px;justify-content:center">
      <div class="row"><div class="lab"><b>Swash servos</b><span>CH1 · CH2 · CH3</span></div>
        <div class="seg"><span class="o">760µs</span><span class="o on">1520µs</span></div></div>
      <div class="row"><div class="lab"><b>Tail servo</b><span>yaw</span></div>
        <div class="seg"><span class="o on">760µs</span><span class="o">1520µs</span></div></div>
    </div>
  </div>
  <div class="ft"><span class="ms"><span class="d"></span>MOTOR SAFE</span><span class="next">Continue ›</span></div>
</div>
<script>var s=document.querySelector(".screen");function fit(){s.style.transform="scale("+Math.min(innerWidth/960,innerHeight/544)+")";}fit();onresize=fit;setTimeout(fit,500);</script>
</body></html>
