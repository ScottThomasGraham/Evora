<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>wiz governor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#f4f7fb;--dim:#aeb8c4;--muted:#6f7c89;--amber:#ff9242;--amber2:#ffb274;--green:#3fe0a0;--line:#2a3644;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{margin:0;background:#04050a;font-family:"Barlow Semi Condensed",sans-serif;}
  .screen{position:relative;width:960px;height:544px;overflow:hidden;color:var(--ink);background:linear-gradient(180deg,#121c28,#05080d);}
  .hd{position:relative;height:68px;background:#0e151e;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--line);}
  .hd .bk{color:var(--amber);font-family:"Rajdhani";font-weight:700;font-size:40px;margin-right:14px;}
  .hd b{font-family:"Rajdhani";font-weight:700;font-size:30px;letter-spacing:2px;}
  .hd .sec{color:var(--muted);font-weight:600;letter-spacing:3px;font-size:20px;margin-left:16px;text-transform:uppercase;}
  .hd .step{margin-left:auto;color:var(--muted);font-weight:600;letter-spacing:2px;font-size:20px;}
  .pbar{position:absolute;left:0;bottom:-1px;height:5px;background:var(--amber);box-shadow:0 0 14px var(--amber);}
  .title{font-family:"Rajdhani";font-weight:700;font-size:52px;line-height:1;padding:14px 24px 0;}
  .sub{color:var(--dim);font-size:22px;font-weight:500;padding:4px 24px 0;}
  .cards{display:flex;gap:16px;padding:14px 24px 0;}
  .card{flex:1;border:1px solid var(--line);border-radius:16px;padding:14px 12px 16px;text-align:center;
    background:linear-gradient(165deg,rgba(255,255,255,.05),rgba(255,255,255,.01));}
  .card.on{border-color:var(--amber);background:linear-gradient(165deg,rgba(255,146,66,.16),rgba(255,146,66,.03));}
  .card .dia{height:110px;display:flex;align-items:center;justify-content:center;}
  .card b{font-family:"Rajdhani";font-weight:700;font-size:30px;display:block;margin-top:6px;}
  .card.on b{color:var(--amber2);}
  .card span{color:var(--muted);font-size:18px;font-weight:500;}
  .ft{position:absolute;left:0;right:0;bottom:0;height:80px;background:#0e151e;border-top:1px solid var(--line);display:flex;align-items:center;padding:0 24px;}
  .ms{display:flex;align-items:center;gap:10px;color:#ff5a5f;font-weight:600;letter-spacing:1px;font-size:20px;}
  .ms .d{width:12px;height:12px;border-radius:50%;background:#ff5a5f;}
  .next{margin-left:auto;background:var(--green);color:#06281a;font-family:"Rajdhani";font-weight:700;font-size:30px;padding:12px 30px;border-radius:14px;}
  .cap{position:fixed;top:6px;left:8px;color:#5a6571;font-size:13px;}
  /* mini schematic helpers */
  .bx{fill:#11161d;stroke:#3a4756;stroke-width:2;}
  .bxA{fill:#1a1108;stroke:var(--amber);stroke-width:2.5;}
  .tg{fill:var(--dim);font-family:"Barlow Semi Condensed";font-weight:600;font-size:15px;text-anchor:middle;}
  .tgA{fill:var(--amber2);font-family:"Rajdhani";font-weight:700;font-size:15px;text-anchor:middle;}
  .ar{stroke:#6f7c89;stroke-width:2.5;fill:none;marker-end:url(#a);}
  .arG{stroke:var(--green);stroke-width:2.5;fill:none;marker-end:url(#ag);stroke-dasharray:4 4;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}</style></head>
<body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Governor</span><span class="step">STEP 11 / 13</span>
    <div class="pbar" style="width:85%"></div></div>
  <div class="title">How is headspeed held?</div>
  <div class="sub">Who keeps the rotor RPM steady?</div>
  <svg width="0" height="0"><defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#6f7c89"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3fe0a0"/></marker>
  </defs></svg>
  <div class="cards">
    <!-- ESC governor -->
    <div class="card">
      <div class="dia"><svg width="220" height="110" viewBox="0 0 220 110">
        <rect class="bx" x="10" y="44" width="56" height="34" rx="6"/><text class="tgA" x="38" y="65">ESC</text>
        <line class="ar" x1="66" y1="61" x2="120" y2="61"/>
        <circle class="bx" cx="150" cy="61" r="22"/><text class="tg" x="150" y="66">motor</text>
        <text class="tg" x="38" y="34">holds RPM</text>
      </svg></div>
      <b>ESC</b><span>The ESC governs</span>
    </div>
    <!-- Rotorflight governor (selected) -->
    <div class="card on">
      <div class="dia"><svg width="220" height="110" viewBox="0 0 220 110">
        <rect class="bxA" x="6" y="44" width="62" height="34" rx="6"/><text class="tgA" x="37" y="65">EVORA</text>
        <line class="ar" x1="68" y1="56" x2="118" y2="56"/>
        <rect class="bx" x="118" y="44" width="40" height="34" rx="6"/><text class="tg" x="138" y="65">ESC</text>
        <line class="ar" x1="158" y1="61" x2="186" y2="61"/>
        <circle class="bx" cx="204" cy="61" r="14"/>
        <path class="arG" d="M204 75 C204 100 37 102 37 80"/>
        <text class="tg" x="37" y="34">holds RPM</text>
      </svg></div>
      <b>Rotorflight</b><span>The FBL governs</span>
    </div>
    <!-- Nitro governor -->
    <div class="card">
      <div class="dia"><svg width="220" height="110" viewBox="0 0 220 110">
        <rect class="bxA" x="6" y="44" width="62" height="34" rx="6"/><text class="tgA" x="37" y="65">EVORA</text>
        <line class="ar" x1="68" y1="56" x2="112" y2="56"/>
        <rect class="bx" x="112" y="46" width="40" height="30" rx="6"/><text class="tg" x="132" y="65">servo</text>
        <line class="ar" x1="152" y1="61" x2="180" y2="61"/>
        <circle class="bx" cx="198" cy="61" r="16"/><text class="tg" x="198" y="66">eng</text>
        <path class="arG" d="M198 78 C198 100 37 102 37 80"/>
        <text class="tg" x="37" y="34">holds RPM</text>
      </svg></div>
      <b>Nitro</b><span>FBL governs engine</span>
    </div>
  </div>
  <div class="ft"><span class="ms"><span class="d"></span>MOTOR SAFE</span><span class="next">Continue ›</span></div>
</div>
<script>var s=document.querySelector(".screen");function fit(){var k=Math.min(innerWidth/960,innerHeight/544);s.style.transform="scale("+k+")";}fit();addEventListener("resize",fit);setTimeout(fit,500);</script></body></html>
