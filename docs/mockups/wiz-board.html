<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>wiz board</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#f4f7fb;--dim:#aeb8c4;--muted:#6f7c89;--amber:#ff9242;--amber2:#ffb274;--green:#3fe0a0;--line:#2a3644;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{margin:0;background:#04050a;font-family:"Barlow Semi Condensed",sans-serif;}
  .screen{position:relative;width:960px;height:544px;overflow:hidden;color:var(--ink);
    background:linear-gradient(180deg,#121c28,#05080d);}
  /* header */
  .hd{position:relative;height:68px;background:#0e151e;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--line);}
  .hd .bk{color:var(--amber);font-family:"Rajdhani";font-weight:700;font-size:40px;margin-right:14px;}
  .hd b{font-family:"Rajdhani";font-weight:700;font-size:30px;letter-spacing:2px;}
  .hd .sec{color:var(--muted);font-weight:600;letter-spacing:3px;font-size:20px;margin-left:16px;text-transform:uppercase;}
  .hd .step{margin-left:auto;color:var(--muted);font-weight:600;letter-spacing:2px;font-size:20px;}
  .pbar{position:absolute;left:0;bottom:-1px;height:5px;background:var(--amber);box-shadow:0 0 14px var(--amber);}
  /* body */
  .title{font-family:"Rajdhani";font-weight:700;font-size:52px;line-height:1;padding:18px 24px 0;}
  .sub{color:var(--dim);font-size:22px;font-weight:500;padding:6px 24px 0;}
  .stage{display:flex;align-items:center;gap:10px;padding:8px 24px 0;}
  .diagram{flex:0 0 360px;height:230px;display:flex;align-items:center;justify-content:center;}
  .chips{flex:1;display:flex;flex-direction:column;gap:12px;padding-left:10px;}
  .chip{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;border:1px solid var(--line);
    background:linear-gradient(165deg,rgba(255,255,255,.05),rgba(255,255,255,.01));}
  .chip.on{border-color:var(--amber);background:linear-gradient(165deg,rgba(255,146,66,.18),rgba(255,146,66,.04));}
  .chip .ico{width:46px;height:34px;flex:0 0 46px;display:flex;align-items:center;justify-content:center;}
  .chip .tx b{font-family:"Rajdhani";font-weight:700;font-size:28px;display:block;line-height:1;}
  .chip .tx span{color:var(--muted);font-size:17px;font-weight:500;}
  .chip.on .tx b{color:var(--amber2);}
  /* footer */
  .ft{position:absolute;left:0;right:0;bottom:0;height:80px;background:#0e151e;border-top:1px solid var(--line);
    display:flex;align-items:center;padding:0 24px;}
  .ms{display:flex;align-items:center;gap:10px;color:#ff5a5f;font-weight:600;letter-spacing:1px;font-size:20px;}
  .ms .d{width:12px;height:12px;border-radius:50%;background:#ff5a5f;}
  .next{margin-left:auto;background:var(--green);color:#06281a;font-family:"Rajdhani";font-weight:700;font-size:30px;
    padding:12px 30px;border-radius:14px;}
  .cap{position:fixed;top:6px;left:8px;color:#5a6571;font-size:13px;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}</style></head>
<body>
<div class="screen">
  <div class="hd"><span class="bk">‹</span><b>NEW HELI</b><span class="sec">Mounting</span><span class="step">STEP 4 / 12</span>
    <div class="pbar" style="width:33%"></div></div>
  <div class="title">Board orientation</div>
  <div class="sub">Mount the flight controller and tell Evora which way it faces.</div>
  <div class="stage">
    <div class="diagram">
      <!-- top-down heli with FBL board + FRONT arrow -->
      <svg width="360" height="230" viewBox="0 0 360 230">
        <!-- rotor disc -->
        <circle cx="180" cy="100" r="92" fill="none" stroke="#243140" stroke-width="2" stroke-dasharray="4 6"/>
        <!-- tail boom -->
        <rect x="172" y="100" width="16" height="120" rx="6" fill="#18222e" stroke="#2a3644"/>
        <!-- tail rotor -->
        <circle cx="180" cy="214" r="20" fill="none" stroke="#243140" stroke-width="2" stroke-dasharray="3 5"/>
        <!-- fuselage -->
        <rect x="150" y="40" width="60" height="110" rx="18" fill="#18222e" stroke="#2a3644" stroke-width="2"/>
        <!-- FBL board -->
        <rect x="158" y="74" width="44" height="40" rx="6" fill="#11161d" stroke="var(--amber)" stroke-width="2.5"/>
        <text x="180" y="99" fill="var(--amber2)" font-family="Rajdhani" font-weight="700" font-size="15" text-anchor="middle">FBL</text>
        <!-- FRONT arrow -->
        <path d="M180 70 l-9 14 h6 v16 h6 v-16 h6 z" fill="var(--amber)"/>
        <text x="180" y="30" fill="var(--dim)" font-family="Barlow Semi Condensed" font-weight="600" font-size="16" letter-spacing="3" text-anchor="middle">FRONT</text>
        <!-- main shaft -->
        <circle cx="180" cy="100" r="7" fill="#2a3644"/>
      </svg>
    </div>
    <div class="chips">
      <div class="chip on">
        <div class="ico"><svg width="46" height="30" viewBox="0 0 46 30"><rect x="6" y="11" width="34" height="9" rx="2" fill="none" stroke="var(--amber)" stroke-width="2"/><circle cx="11" cy="15.5" r="1.6" fill="var(--amber)"/></svg></div>
        <div class="tx"><b>Flat</b><span>Board face up, level</span></div>
      </div>
      <div class="chip">
        <div class="ico"><svg width="46" height="30" viewBox="0 0 46 30"><rect x="6" y="11" width="34" height="9" rx="2" fill="none" stroke="#6f7c89" stroke-width="2"/><circle cx="35" cy="15.5" r="1.6" fill="#6f7c89"/></svg></div>
        <div class="tx"><b>Inverted</b><span>Board upside down</span></div>
      </div>
      <div class="chip">
        <div class="ico"><svg width="46" height="30" viewBox="0 0 46 30"><rect x="20" y="4" width="9" height="22" rx="2" fill="none" stroke="#6f7c89" stroke-width="2"/></svg></div>
        <div class="tx"><b>On side</b><span>Vertical mount</span></div>
      </div>
    </div>
  </div>
  <div class="ft"><span class="ms"><span class="d"></span>MOTOR SAFE</span><span class="next">Looks right ›</span></div>
</div>
<script>var s=document.querySelector(".screen");function fit(){var k=Math.min(innerWidth/960,innerHeight/544);s.style.transform="scale("+k+")";}fit();addEventListener("resize",fit);setTimeout(fit,500);</script></body></html>
